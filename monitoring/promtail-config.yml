server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # ─── Logs de tous les containers Docker ────────────────────────────
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: status
            values: [running]
    relabel_configs:
      # Label : nom du container
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      # Label : image Docker
      - source_labels: [__meta_docker_container_image]
        target_label: image
      # Label : service (depuis le nom du container)
      - source_labels: [__meta_docker_container_name]
        regex: '/ecommerce_(.*)'
        target_label: service
        replacement: '$1'
      # Label : project
      - target_label: project
        replacement: ecommerce-monitoring
      # AJOUTER CECI
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/*-json.log'

    pipeline_stages:
      # Parser JSON si le log est en JSON (FastAPI / Uvicorn)
      - json:
          expressions:
            level:   level
            message: message
            time:    time
      # Extraire le niveau de log (INFO, WARNING, ERROR, CRITICAL)
      - regex:
          expression: '(?i)(INFO|WARNING|ERROR|CRITICAL|DEBUG)'
          source: message
      # Filtrer les logs de santé (trop fréquents, peu utiles)
      - drop:
          expression: '.*GET /metrics/metrics.*'
      - drop:
          expression: '.*GET /health.*'

  # ─── Logs spécifiques backend FastAPI ───────────────────────────────
  - job_name: ecommerce_backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [ecommerce_backend]
    relabel_configs:
      - target_label: service
        replacement: backend
      - target_label: project
        replacement: ecommerce-monitoring
    pipeline_stages:
      - json:
          expressions:
            level:   levelname
            message: message
      # Détecter les anomalies ML dans les logs
      - regex:
          expression: '.*anomalie.*|.*anomaly.*|.*ANOMALY.*'
          source: message
      - labels:
          level:
          anomaly_detected:

  # ─── Logs Celery Worker ──────────────────────────────────────────────
  - job_name: celery
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: [ecommerce_celery_worker, ecommerce_celery_beat]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/ecommerce_(.*)'
        target_label: service
        replacement: '$1'
      - target_label: project
        replacement: ecommerce-monitoring
