apiVersion: 1

datasources:

  # ─── Prometheus ────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      queryTimeout: "60s"
      httpMethod: POST

  # ─── Loki (logs) ───────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Lier les logs Loki aux traces si ajout tracing plus tard
        - name: TraceID
          matcherRegex: "trace_id=(\\w+)"
          url: ""
