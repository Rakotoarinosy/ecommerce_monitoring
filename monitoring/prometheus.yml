global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    project: 'ecommerce-monitoring'
    env: 'production'

# ─── AlertManager ────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─── Règles d'alerte ─────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/rules/ml_alerts.yml
  - /etc/prometheus/rules/infra_alerts.yml
  - /etc/prometheus/rules/payment_alerts.yml

# ─── Scrape configs ───────────────────────────────────────────────────
scrape_configs:

  - job_name: 'ecommerce_backend'
    static_configs:
      - targets: ['backend:8011']
    metrics_path: '/metrics/metrics'

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
